version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/server1
permissions:
  - object: /home/ubuntu/server1
    owner: ubuntu
    group: ubuntu
    type:
      - directory
      - file
hooks:
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 600
      runas: ubuntu
